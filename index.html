```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArabSeed</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #0b0f1a;
    color: white;
    direction: rtl;
}

/* الهيدر */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #111827;
}

.header input {
    padding: 8px;
    border-radius: 5px;
    border: none;
}

/* القائمة */
.nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #0f172a;
    padding: 10px;
}

.nav a {
    color: white;
    text-decoration: none;
}

/* البانر */
.banner {
    position: relative;
}

.banner img {
    width: 100%;
    height: 350px;
    object-fit: cover;
}

.banner-text {
    position: absolute;
    bottom: 20px;
    right: 20px;
}

/* الفيديو */
.video {
    padding: 20px;
    text-align: center;
}

video {
    width: 80%;
    border-radius: 10px;
}

/* التقييم */
.rating {
    text-align: center;
    font-size: 25px;
    margin: 10px;
}

.star {
    cursor: pointer;
    color: gray;
}

.star.active {
    color: gold;
}

/* الحلقات */
.episodes {
    padding: 20px;
}

.episodes button {
    margin: 5px;
    padding: 10px;
    background: #1f2937;
    color: white;
    border: none;
    cursor: pointer;
}

/* الأزرار */
.btn {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.watch {
    background: #2563eb;
}

.download {
    background: #1f2937;
}
</style>

</head>

<body>

<!-- الهيدر -->
<div class="header">
    <div>ArabSeed</div>
    <input type="text" placeholder="ابحث..." onkeyup="search()">
</div>

<!-- القائمة -->
<div class="nav">
    <a href="#">الرئيسية</a>
    <a href="#">الأفلام</a>
    <a href="#">المسلسلات</a>
</div>

<!-- البانر -->
<div class="banner">
    <img src="https://via.placeholder.com/1200x350">
    <div class="banner-text">
        <h2 id="title">الحلقة 1</h2>
    </div>
</div>

<!-- الفيديو -->
<div class="video">
    <video id="player" controls>
        <source src="" type="video/mp4">
        متصفحك لا يدعم الفيديو
    </video>
</div>

<!-- التقييم -->
<div class="rating">
    ⭐ تقييم:
    <span class="star" onclick="rate(1)">★</span>
    <span class="star" onclick="rate(2)">★</span>
    <span class="star" onclick="rate(3)">★</span>
    <span class="star" onclick="rate(4)">★</span>
    <span class="star" onclick="rate(5)">★</span>
</div>

<!-- الحلقات -->
<div class="episodes">
    <h3>الحلقات</h3>
    <button onclick="play('video1.mp4','الحلقة 1')">1</button>
    <button onclick="play('video2.mp4','الحلقة 2')">2</button>
    <button onclick="play('video3.mp4','الحلقة 3')">3</button>
</div>

<!-- أزرار -->
<div style="text-align:center;">
    <button class="btn watch">مشاهدة الآن</button>
    <button class="btn download">تحميل</button>
</div>

<script>
// تشغيل الحلقة
function play(src, title) {
    document.getElementById("player").src = src;
    document.getElementById("title").innerText = title;
}

// التقييم
function rate(num) {
    let stars = document.querySelectorAll(".star");
    stars.forEach((s, i) => {
        s.classList.toggle("active", i < num);
    });
}

// البحث (تجريبي)
function search() {
    let input = document.querySelector("input").value;
    console.log("بحث عن:", input);
}
</script>

</body>
</html>
```

## 🔥 تعمل إيه دلوقتي؟

### 1. حط فيديوهاتك

غير:

```html
video1.mp4
```

باسم الفيديو عندك

---

### 2. لو عايز فيديو من الإنترنت

ممكن تستخدم:

```html
<video controls src="رابط الفيديو"></video>
```
