<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extra Turki</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial;
}

header {
    background: linear-gradient(to right, red, darkred);
    padding: 20px;
    text-align: center;
    font-size: 35px;
    font-weight: bold;
    letter-spacing: 2px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.card {
    margin: 15px;
    width: 200px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.08);
}

.card img {
    width: 100%;
    border-radius: 12px;
}

.card p {
    text-align: center;
    margin-top: 10px;
    font-size: 16px;
}

/* زرار */
.watch-btn {
    display: block;
    margin: 10px auto;
    padding: 8px;
    background: red;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.watch-btn:hover {
    background: darkred;
}

/* الفوتر */
footer {
    text-align: center;
    padding: 15px;
    background: #111;
    margin-top: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>🔥 Extra Turki 🔥</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/200x300?text=Series+1">
<p>مسلسل تركي 1</p>
<button class="watch-btn">شاهد الآن</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200x300?text=Series+2">
<p>مسلسل تركي 2</p>
<button class="watch-btn">شاهد الآن</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200x300?text=Series+3">
<p>مسلسل تركي 3</p>
<button class="watch-btn">شاهد الآن</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200x300?text=Series+4">
<p>مسلسل تركي 4</p>
<button class="watch-btn">شاهد الآن</button>
</div>

</div>

<footer>
© 2026 Extra Turki - جميع الحقوق محفوظة
</footer>

</body>
</html>
