<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تركىExtra </title>

<style>
body {
    margin: 0;
    font-family: 'Cairo', Arial;
    background: #0b0f1a;
    color: white;
    direction: rtl;
}

/* الهيدر */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #111827;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #3b82f6;
}

.header input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: 150px;
}

/* القائمة */
.nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #0f172a;
    padding: 10px;
    flex-wrap: wrap;
}

.nav a {
    color: white;
    text-decoration: none;
}

/* البانر */
.banner {
    position: relative;
}

.banner img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.banner-text {
    position: absolute;
    bottom: 20px;
    right: 20px;
    text-shadow: 0 0 10px black;
}

/* الفيديو */
.video {
    padding: 15px;
    text-align: center;
}

video {
    width: 90%;
    max-width: 700px;
    border-radius: 10px;
}

/* التقييم */
.rating {
    text-align: center;
    font-size: 25px;
}

.star {
    cursor: pointer;
    color: gray;
}

.star.active {
    color: gold;
}

/* الحلقات */
.episodes {
    padding: 15px;
    text-align: center;
}

.episodes button {
    margin: 5px;
    padding: 10px 15px;
    background: #1f2937;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.episodes button:hover {
    background: #3b82f6;
}

/* الأزرار */
.btn {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.watch {
    background: #2563eb;
}

.download {
    background: #374151;
}

/* موبايل */
@media (max-width: 600px) {
    .header {
        flex-direction: column;
        gap: 10px;
    }

    .header input {
        width: 100%;
    }

    .banner img {
        height: 200px;
    }
}
</style>

</head>

<body>

<!-- الهيدر -->
<div class="header">
    <div class="logo">🎬 Extra تركى</div>
    <input type="text" placeholder="ابحث..." onkeyup="search()">
</div>

<!-- القائمة -->
<div class="nav">
    <a href="#">الرئيسية</a>
    <a href="#">الأفلام</a>
    <a href="#">المسلسلات</a>
</div>

<!-- البانر -->
<div class="banner">
    <img src="https://via.placeholder.com/1200x300">
    <div class="banner-text">
        <h2 id="title">الحلقة 1</h2>
    </div>
</div>

<!-- الفيديو -->
<div class="video">
    <video id="player" controls>
        <source src="" type="video/mp4">
    </video>
</div>

<!-- التقييم -->
<div class="rating">
    ⭐ تقييم:
    <span class="star" onclick="rate(1)">★</span>
    <span class="star" onclick="rate(2)">★</span>
    <span class="star" onclick="rate(3)">★</span>
    <span class="star" onclick="rate(4)">★</span>
    <span class="star" onclick="rate(5)">★</span>
</div>

<!-- الحلقات -->
<div class="episodes">
    <h3>الحلقات</h3>
    <button onclick="play('video1.mp4','الحلقة 1')">1</button>
    <button onclick="play('video2.mp4','الحلقة 2')">2</button>
    <button onclick="play('video3.mp4','الحلقة 3')">3</button>
</div>

<!-- أزرار -->
<div style="text-align:center;">
    <button class="btn watch">مشاهدة الآن</button>
    <button class="btn download">تحميل</button>
</div>

<script>
function play(src, title) {
    document.getElementById("player").src = src;
    document.getElementById("title").innerText = title;
}

function rate(num) {
    let stars = document.querySelectorAll(".star");
    stars.forEach((s, i) => {
        s.classList.toggle("active", i < num);
    });
}

function search() {
    let input = document.querySelector("input").value;
    console.log("بحث عن:", input);
}
</script>

</body>
</html>
